<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Quick Space</title>
</head>
 <!-- Section Dashboard: Hill -->
<body class="m-0 p-0 box-border bg-gradient-to-b from-white from-0.5% to-[#E4ECFF] min-h-screen overflow-x-hidden">
    <section class="w-full min-h-screen flex flex-col items-center text-center px-5 sm:px-6 pt-40 md:pt-12">
      <div
        class="
          text-[#6F7DE0] bg-[#E3E7FF] font-semibold rounded-xl
          text-base sm:text-lg
          px-7 sm:px-9
          py-3 sm:py-2
          mb-8 md:mb-5
        "
      >
        Discover & Explore
      </div>
      <h1
        class="
          text-[#0A1050] font-bold leading-[1.45] md:leading-tight
          text-[32px] sm:text-[38px] md:text-[34px]
          max-w-[520px] md:max-w-none
          mb-8 md:mb-9
        "
      >
        Join An Attractive & Personalized
      </h1>
  
      <!-- Description -->
      <p
        class="
          text-[#616581] font-normal
          text-[22px] sm:text-[24px] md:text-xl
          leading-[1.65] md:leading-[1.9]
          max-w-[520px] md:max-w-[880px]
          mb-12 md:mb-16
        "
      >
        Graphs displaying your performance for
        metrics like follower evolution, average
        rate per post and reach and impressions
        to give you the insights.
      </p>
  
      <!-- Images Area -->
      <div class="relative flex justify-center items-start w-full max-w-[1200px]">
  
        <!-- Desktop / Tablet Image Group -->
        <div class="relative hidden md:flex justify-center items-start w-full">
  
          <!-- Dashboard Overview Image -->
          <img
            src="/assets/images/dashboard.png"
            alt="Dashboard Overview"
            class="
              h-[70vh] max-h-[720px] w-auto object-contain
              transition-all duration-500 ease-out
            "
          />
  
          <!-- Sales Image -->
          <img
            src="/assets/images/sales.png"
            alt="Sales"
            class="
              absolute h-[36vh] max-h-[350px] w-auto object-contain
              top-[43%]
  
              md:left-[2%] md:top-[43%]
              lg:-left-[13%] lg:top-[44%]
  
              transition-all duration-500 ease-out
            "
          />
  
        </div>
  
        <!-- Mobile Image Only -->
        <img
          src="/assets/images/dashboard 2.png"
          alt="Mobile Dashboard"
          class="
            block md:hidden
            w-full max-w-[560px] h-auto object-contain
            transition-all duration-500 ease-out
          "
        />
      </div>
    </section>
</body>
</html>
